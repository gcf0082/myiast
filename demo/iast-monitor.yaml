# ============================================
# IAST 监控配置文件（YAML格式）
# ============================================

# --- 全局输出配置 ---
output:
  args: true                 # 是否输出方法参数
  return: true               # 是否输出返回值
  stacktrace: true           # 是否输出调用栈
  stacktraceDepth: 8         # 调用栈最大深度

# --- 全局默认监控配置 ---
monitor:
  default:
    events: [enter, return, exception]   # 默认监控事件：enter(调用前)/return(调用后)/exception(抛异常)

  # --- 监控规则列表 ---
  rules:
    # 简单模式：类名 + 方法列表，使用全局默认配置
    - className: java.io.File
      methods:
        - "<init>#*"
        - "exists#()Z"
        - "getAbsolutePath#()Ljava/lang/String;"
    
    - className: java.nio.file.Files
      methods:
        - "exists#(Ljava/nio/file/Path;[Ljava/nio/file/LinkOption;)Z"
    
    - className: java.net.Socket
      methods:
        - "connect#*"
    
    - className: java.lang.Runtime
      methods:
        - "exec#*"
    

