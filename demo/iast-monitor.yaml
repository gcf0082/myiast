# ============================================
# IAST 监控配置文件（YAML格式）
# ============================================

# --- 全局输出配置 ---
output:
  args: true                 # 是否输出方法参数
  return: true               # 是否输出返回值
  stacktrace: true           # 是否输出调用栈
  stacktraceDepth: 8         # 调用栈最大深度

# --- 全局默认监控配置 ---
monitor:
  default:
    events: [enter, return, exception]   # 默认监控事件：enter(调用前)/return(调用后)/exception(抛异常)

  # --- 监控规则列表 ---
  rules:
    # 使用默认日志插件
    - className: java.io.File
      methods:
        - "<init>#*"
        - "exists#()Z"
        - "getAbsolutePath#()Ljava/lang/String;"
      plugin: LogPlugin
    
    - className: java.nio.file.Files
      methods:
        - "exists#(Ljava/nio/file/Path;[Ljava/nio/file/LinkOption;)Z"
      plugin: LogPlugin
    
    - className: java.net.Socket
      methods:
        - "connect#*"
      plugin: LogPlugin
    
    - className: java.lang.Runtime
      methods:
        - "exec#*"
      plugin: LogPlugin
    
    # Servlet请求跟踪插件
    - className: jakarta.servlet.http.HttpServlet
      methods:
        - "service#*"
      plugin: RequestIdPlugin

    # 通用事件插件：YAML 配置驱动，JSONL 事件输出
    - className: java.nio.file.Files
      methods:
        - "list#(Ljava/nio/file/Path;)Ljava/util/stream/Stream;"
      plugin: CustomEventPlugin
      pluginConfig:
        id: java.nio.file.Files.list
        my_params:
          file_path: "params[0].toString()"
        event: "file list | {file_path}"
        event_type: file.list
        event_level: info


