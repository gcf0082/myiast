# IAST 监控配置文件
# 配置格式说明：
# monitor.<全类名> = <方法1名>#<方法1描述符>,<方法2名>#<方法2描述符>
#
# 方法描述符说明：
# ()V - 无参void返回
# ()Z - 无参boolean返回
# ()I - 无参int返回
# (Ljava/lang/String;)V - 参数为String，返回void
# (Ljava/io/File;)Z - 参数为File，返回boolean
#
# 注意事项：
# 非常核心的JDK类（如java.lang.String、java.lang.Object等）
# 可能会因为JVM启动时已被大量使用而无法retransform
# 建议监控其他JDK类（如java.io.*、java.net.*、java.util.*等
#
# 示例配置：

# 监控java.io.File.exists()方法
monitor.java.io.File = exists#()Z,getAbsolutePath#()Ljava/lang/String;

# 监控Socket.connect()方法
# monitor.java.net.Socket = connect#(Ljava/net/SocketAddress;I)V

# 监控ArrayList.size()方法
# monitor.java.util.ArrayList = size#()I,add#(Ljava/lang/Object;)Z
