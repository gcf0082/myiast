# ============================================
# IAST 监控配置文件
# ============================================

# --- 全局输出控制 ---
# 是否打印方法参数（默认true）
output.args = true
# 是否打印返回值（默认true）
output.return = true
# 是否打印调用栈（默认true）
output.stacktrace = true
# 调用栈最大深度（默认8）
output.stacktrace.depth = 8

# --- 监控规则 ---
# 格式: monitor.<全类名> = <方法名>#<描述符>, ...
#
# 描述符说明:
#   ()V              - 无参void返回
#   ()Z              - 无参boolean返回
#   ()I              - 无参int返回
#   (Ljava/lang/String;)V - 参数为String，返回void
#   *                - 通配符，匹配该方法名的所有重载
#
# 构造函数使用 <init> 作为方法名:
#   <init>#*                      - 匹配所有构造函数
#   <init>#(Ljava/lang/String;)V  - 匹配特定参数的构造函数
#
# 注意事项：
# 非常核心的JDK类（如java.lang.String、java.lang.Object等）
# 可能会因为JVM启动时已被大量使用而无法retransform
# 建议监控其他JDK类（如java.io.*、java.net.*、java.util.*等）
#
# 示例配置：

# 监控java.io.File的构造函数、exists()和getAbsolutePath()方法
monitor.java.io.File = <init>#*, exists#()Z, getAbsolutePath#()Ljava/lang/String;

# 监控java.nio.file.Files的exists()方法
monitor.java.nio.file.Files = exists#(Ljava/nio/file/Path;[Ljava/nio/file/LinkOption;)Z

# 监控Socket.connect() - 所有重载
# monitor.java.net.Socket = connect#*

# 监控Runtime.exec() - 所有重载
# monitor.java.lang.Runtime = exec#*

# 监控ArrayList.add() - 所有重载
# monitor.java.util.ArrayList = add#*
