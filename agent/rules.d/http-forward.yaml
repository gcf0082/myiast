# 出口链路头透传
# 目标类来自具体业务环境（com.huawei.bsp.roa.util.restclient.HttpRest）。
# 不在的环境本规则不命中、插件不会被调用、不会报错——所以默认启用是安全的。
# 详见 README.md 「内置插件」表 HttpForwardPlugin 一行。
# 适配其他出口客户端时直接复制本插件改一份（本插件硬编码 args[2].putHttpContextHeader）。

id: forward.http-rest
className: com.huawei.bsp.roa.util.restclient.HttpRest
methods:
  - "sendHttpRequest#*"
plugin: HttpForwardPlugin
