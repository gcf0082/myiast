# ============================================
# IAST Agent 监控配置（YAML）
# 字段说明详见 README.md
# ============================================

output:
  args: true                 # 拦截日志是否打印入参
  return: true               # 是否打印返回值
  stacktrace: true           # 是否打印调用栈
  stacktraceDepth: 8
  # eventsPath: /tmp/iast-events.jsonl   # 可选，默认 /tmp/iast-events-<pid>.jsonl
  logLevel: info             # debug|info|warn|error，默认 info；
                             # 排查"插件没动静 / 响应头丢失 / 监控开关切换异常"等问题时调成 debug，
                             # 也可以通过 CLI `loglevel debug` 运行时切换

monitor:
  default:
    # 全局开关：matchType=interface 规则是否覆盖 Agent 安装后新加载的实现类。
    # 默认 false —— 只拦截安装瞬间已加载的实现类；避免意外扩大拦截面。
    # 注意 premain 模式：Spring 容器在 Agent 之后启动，多数 Servlet 实现都属于"安装后新加载"，
    # 若要覆盖 DispatcherServlet 之类，请显式设置 true。
    includeFutureClasses: false

    # premain 模式下延迟多少毫秒再 install 字节码（agentmain/attach 模式忽略此项）。
    # 目的：把 retransform + 逐类拦截的开销推迟到业务启动之后，避免拖慢应用启动。
    # 默认 60000（1 分钟）；设为 0 表示 JVM 启动时立即 install（老行为）。
    # 延迟期间 Agent 已加载配置/插件，只是暂不拦截方法；到期后会一次性 retransform 已加载的类。
    premainDelayMs: 60000
  rules:
    # ---------- 示例 1：File/Files 基础拦截 ----------
    - className: java.io.File
      methods:
        - "<init>#*"
        - "exists#()Z"
        - "getAbsolutePath#()Ljava/lang/String;"
      plugin: CustomEventPlugin
      pluginConfig:
        my_params:
          method: "methodName"
          arg0: "params[0]"
        event: "java.io.File.{method}({arg0})"
        event_type: file.io

    - className: java.nio.file.Files
      methods:
        - "exists#(Ljava/nio/file/Path;[Ljava/nio/file/LinkOption;)Z"
      plugin: CustomEventPlugin
      pluginConfig:
        my_params:
          path: "params[0].toString()"
        event: "Files.exists({path})"
        event_type: file.exists

    - className: java.net.Socket
      methods:
        - "connect#*"
      plugin: CustomEventPlugin
      pluginConfig:
        my_params:
          remote: "params[0]"
        event: "Socket.connect({remote})"
        event_type: net.connect

    - className: java.lang.Runtime
      methods:
        - "exec#*"
      plugin: CustomEventPlugin
      pluginConfig:
        my_params:
          cmd: "params[0]"
        event: "Runtime.exec({cmd})"
        event_type: process.exec

    # ---------- 示例 2：Servlet 请求 ID 跟踪 ----------
    # 为每个 HTTP 请求生成 UUID，写到 ThreadLocal 和响应头 X-Request-Id
    - className: jakarta.servlet.http.HttpServlet
      methods:
        - "service#*"
      plugin: RequestIdPlugin

    # ---------- 示例 3：CustomEventPlugin 结构化事件 ----------
    # 同一 (className, methodName) 对只能挂一条 CustomEventPlugin 规则（plugin 内部 key
    # 按 className+methodName 去重，重复定义会彼此覆盖）。
    - className: java.nio.file.Files
      methods:
        - "list#(Ljava/nio/file/Path;)Ljava/util/stream/Stream;"
      plugin: CustomEventPlugin
      pluginConfig:
        id: java.nio.file.Files.list
        my_params:
          file_path: "params[0].toString()"
        event: "file list | {file_path}"
        event_type: file.list
        event_level: info
        # on: [enter]          # 默认 enter；可填 enter/exit/exception 组合

    # ---------- 示例 4：接口匹配 (matchType: interface) ----------
    # 把规则挂到接口上，拦截所有已加载的 *具体实现类*（排除接口/抽象类本身）。
    # 新加载的实现类是否也拦截，由上方 monitor.default.includeFutureClasses 全局控制。
    #
    # 监控所有 javax.servlet.Servlet 实现的 service(ServletRequest, ServletResponse) 调用。
    # 注意：javax.servlet.* 是 Jakarta EE 8 及之前的命名空间（Tomcat 9 / Spring Boot 2 等）；
    # Jakarta EE 9+（Tomcat 10 / Spring Boot 3）用的是 jakarta.servlet.*，需要把 javax 全部换成 jakarta。
    - className: javax.servlet.Servlet
      matchType: interface
      methods:
        - "service#(Ljavax/servlet/ServletRequest;Ljavax/servlet/ServletResponse;)V"
      plugin: CustomEventPlugin
      pluginConfig:
        my_params:
          impl: "target.getClass().getName()"
        event: "javax Servlet.service | {impl}"
        event_type: servlet.service

    # ---------- 示例 5：ServletBodyPlugin（打印请求 body） ----------
    # wrapServletRequest=true 触发专用 ServletBodyAdvice，改写 service 的入参 0：把原 HttpServletRequest
    # 换成我们的 BufferingHttpServletRequestWrapper。业务后续 getInputStream()/getReader() 都是基于堆内
    # byte[] 的 fresh 流，不消费、不破坏，随意重读；Agent 拿 cachedBody 打日志。
    # v1 仅支持 jakarta.servlet.*（Spring Boot 3 / Tomcat 10+）。
    # - className: jakarta.servlet.http.HttpServlet
    #   methods:
    #     - "service#(Ljakarta/servlet/ServletRequest;Ljakarta/servlet/ServletResponse;)V"
    #   plugin: ServletBodyPlugin
    #   wrapServletRequest: true
    #   pluginConfig:
    #     maxLogBytes: 8192            # 日志里 body 最多打多少字节
    #     hardLimitBytes: 10485760     # wrapper 读进堆的硬上限（10MB）；超过会截断，业务也拿不到完整 body
    #     textContentTypes:            # 只对这些前缀的 Content-Type 做包装解码；填 ["*"] 放行所有
    #       - application/json
    #       - application/xml
    #       - application/x-www-form-urlencoded
    #       - text/
    #     charset: UTF-8               # Content-Type 没带 charset 时的兜底

    # ---------- 示例 6：HttpForwardPlugin（出口链路头透传） ----------
    # 业务进程作为 client 发起出口 HTTP 时，把入口 RequestIdPlugin 收集的 client_ip /
    # forward 链 / xseeker 注入到下游请求里，下游 hook 同套 servlet 入口规则就能把链路接上。
    # 头名（与参考体系对齐）：
    #   x-seeker-forward-req-id   = (incoming-chain ?: "") + "," + 本机 reqId
    #   x-seeker-forward-ip       = 入口算好的 forward_ip 链
    #   xseeker                   = 透传字段，原样进出
    # 目标类来自具体业务环境（com.huawei.bsp.roa.util.restclient.HttpRest），不在的环境
    # 本规则不命中、插件不会被调用、不会报错。
    # 本插件不接受 pluginConfig，行为对齐 HttpRest 的固定签名：
    # 反射调用 args[2].putHttpContextHeader(String, String)。需要适配其他出口客户端
    # 时直接写一个新插件，而不是把这个通用化。
    # - className: com.huawei.bsp.roa.util.restclient.HttpRest
    #   methods:
    #     - "sendHttpRequest#*"
    #   plugin: HttpForwardPlugin
