# ============================================
# IAST Agent 监控主配置（YAML）
# v3 起：规则不再写在本文件里，统一从 monitor.default.rulesDir 指向的目录加载，
# 每个 yaml 文件支持 multi-doc（用 --- 分割），每个 doc 一条规则，每条规则可加 id 标签。
# 字段语义详见 README.md「规则目录」章节。
# ============================================

output:
  args: true                 # 拦截日志是否打印入参
  return: true               # 是否打印返回值
  stacktrace: true           # 是否打印调用栈
  stacktraceDepth: 8
  # eventsPath: /tmp/iast-events.jsonl   # 可选，默认 /tmp/iast-events-<pid>.jsonl
  logLevel: info             # debug|info|warn|error，默认 info；
                             # 排查"插件没动静 / 响应头丢失 / 监控开关切换异常"等问题时调成 debug，
                             # 也可以通过 CLI `loglevel debug` 运行时切换

monitor:
  default:
    # 全局开关：matchType=interface 规则是否覆盖 Agent 安装后新加载的实现类。
    # 默认 false —— 只拦截安装瞬间已加载的实现类；避免意外扩大拦截面。
    # 注意 premain 模式：Spring 容器在 Agent 之后启动，多数 Servlet 实现都属于"安装后新加载"，
    # 若要覆盖 DispatcherServlet 之类，请显式设置 true。
    includeFutureClasses: false

    # premain 模式下延迟多少毫秒再 install 字节码（agentmain/attach 模式忽略此项）。
    # 目的：把 retransform + 逐类拦截的开销推迟到业务启动之后，避免拖慢应用启动。
    # 默认 60000（1 分钟）；设为 0 表示 JVM 启动时立即 install（老行为）。
    # 延迟期间 Agent 已加载配置/插件，只是暂不拦截方法；到期后会一次性 retransform 已加载的类。
    premainDelayMs: 60000

    # 外部插件目录：非空时 agent 会扫该目录下所有 *.jar，用 ServiceLoader 加载其中的
    # com.iast.agent.plugin.IastPlugin 实现。空字符串 = 不加载任何外部插件（默认）。
    # pluginsDir: /opt/iast/plugins

    # 规则目录：扫该目录下所有 *.yaml/*.yml，每个文件 multi-doc（--- 分割）。
    # 相对路径按本 yaml 所在目录解析。空字符串 = 不从目录加载（默认；需要才显式开启）。
    rulesDir: ./rules.d

    # 过滤器目录：和 rulesDir 同套约定（递归扫子目录、每个 yaml multi-doc、相对路径按本
    # yaml 解析）。每条 filter 通过 target: <rule-id> 关联到一条规则上，命中时静默 drop
    # 该规则要写的事件，不计数、不打额外日志。空字符串 = 不加载任何过滤器（默认）。
    # 详见 README.md 「事件过滤 filtersDir」章节。
    filtersDir: ./filters.d

    # 规则启停开关：以「相对 rulesDir 的 path」为粒度的 enable/disable 列表。
    # path 以 .yaml/.yml 结尾视为文件、否则视为目录前缀（覆盖该目录所有子文件）；
    # 同一文件多条匹配时**最长 path 胜出**（最具体路径优先）；mode 缺省为 enable；
    # 不在列表里的文件默认 enable（零配置 = 全部启用）。
    #
    # ruleToggles:
    #   - path: default/command            # 启用整个 default/command/ 子目录（默认就是 enable，多写一行做 self-doc）
    #     mode: enable
    #   - path: default/file               # 关掉整个 default/file/ 子目录
    #     mode: disable
    #   - path: default/file/keep.yaml     # 但保留这一个文件（最长 path 胜出，覆盖父目录的 disable）
    #     mode: enable

  # ⚠️ 历史 monitor.rules: inline 形式已废弃。检测到此节存在会 WARN 一句但不解析。
  # 把规则迁到 rulesDir 指向的目录即可，每条规则一份小 yaml（或 multi-doc 一文件多条）。
