# ============================================
# demo-spring 主配置（output + monitor.default）
# 规则在 ./rules.d/ 下，每个 yaml 文件 multi-doc（用 --- 分割）
# 用于 test-monitor-switch.sh（attach 模式）和 run-premain.sh（premain 模式）
# ============================================

output:
  args: true
  return: true
  stacktrace: true
  stacktraceDepth: 8
  # 想看 RequestIdPlugin 的 setHeader 决策路径 / 插件分发 miss 等细节，调成 debug；
  # 也可以挂 CLI 之后 `loglevel debug` 运行时切换。
  logLevel: info
  # 输出根目录；最终 iast.log + iast.jsonl 落在 outputDir/<instanceName>/ 下。
  # 不配 instanceName → 自动用 iast_<pid> 作为子目录名（前缀避免 /tmp 下出现纯数字目录）。
  outputDir: logs
  # instanceName: ${HOSTNAME}      # 想用环境变量做实例名就打开
  # maxFiles: 5          # 实例目录下最多保留 N 个文件（含活跃；默认 5）
  # maxFileSizeMb: 20    # 单文件超过 M MB 后滚动（默认 20MB；≤0 禁用）

monitor:
  default:
    # 开启后，接口规则（matchType: interface）也会拦截 Agent 安装后新加载的实现类。
    # premain 场景下 DispatcherServlet 等基本都是安装后才加载，需要 true 才能覆盖。
    includeFutureClasses: true
    # demo 需要立即看到拦截日志，所以这里把 premain 延迟设为 0；
    # 生产环境建议保留默认 60000（1 分钟），让业务先把启动走完再 install。
    premainDelayMs: 0
    # 外部插件目录。**相对路径按本 yaml 文件所在目录解析**（而不是 JVM 的 CWD），
    # 所以 demo/plugins/ 下放任何插件 jar，无论从哪个目录启动都能找到。
    pluginsDir: ./plugins
    # 规则目录：扫该目录下所有 *.yaml/*.yml，每个文件 multi-doc。
    # 相对路径同样按本 yaml 所在目录解析。
    rulesDir: ./rules.d
