# ============================================
# demo-spring 专属 IAST 监控配置
# 与 demo/iast-monitor.yaml 独立，专为 demo-spring/test-monitor-switch.sh 设计
# ============================================

output:
  args: true
  return: true
  stacktrace: true
  stacktraceDepth: 8

monitor:
  rules:
    # Step 1-3 使用：LogPlugin 基础拦截日志
    - className: java.io.File
      methods:
        - "<init>#*"
        - "exists#()Z"
        - "getAbsolutePath#()Ljava/lang/String;"
      plugin: LogPlugin

    # Step 4 使用：Servlet 请求 ID 跟踪
    - className: jakarta.servlet.http.HttpServlet
      methods:
        - "service#*"
      plugin: RequestIdPlugin

    # Step 5a 使用：CustomEventPlugin，演示 params[0] 取参
    # 同一个方法也挂上 LogPlugin，验证"一个函数多个插件处理"——两份日志都会出
    - className: java.nio.file.Files
      methods:
        - "list#(Ljava/nio/file/Path;)Ljava/util/stream/Stream;"
      plugin: CustomEventPlugin
      pluginConfig:
        id: java.nio.file.Files.list
        my_params:
          file_path: "params[0].toString()"
        event: "file list | {file_path}"
        event_type: file.list
        event_level: info

    - className: java.nio.file.Files
      methods:
        - "list#(Ljava/nio/file/Path;)Ljava/util/stream/Stream;"
      plugin: LogPlugin

    # Step 5b 使用：CustomEventPlugin，演示 target / params[N] / return / 链式方法调用
    - className: com.iast.demo.FileCheckController
      methods:
        - "repeatMsg#(Ljava/lang/String;I)Ljava/lang/String;"
      plugin: CustomEventPlugin
      pluginConfig:
        id: com.iast.demo.FileCheckController.repeatMsg
        my_params:
          target_class: "target.getClass().getSimpleName()"
          msg: "params[0]"
          times: "params[1].toString()"
          combined: "return"
        event: "repeatMsg | target={target_class} msg={msg} times={times} -> {combined}"
        event_type: demo.repeat
        event_level: info
        on: [exit]
